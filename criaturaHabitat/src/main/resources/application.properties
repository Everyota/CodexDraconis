spring.application.name=CriaturaHabitat
#Puerto asignado
server.port=8087

#Configuraciones BBDD
spring.datasource.url=jdbc:mysql://localhost:3306/codexdraconis?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=

#Configuraciones opcionales de JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true