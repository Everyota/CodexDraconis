spring.application.name=Usuario
#Puerto asignado
server.port=8082

#Configuraciones BBDD
spring.datasource.url=jdbc:mysql://localhost:3306/codexdraconis?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Santiago
spring.datasource.username=root
spring.datasource.password=
# Para que Flyway funcione aunque esté la base de datos ya creada
spring.flyway.baseline-on-migrate=true

#Configuraciones opcionales de JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Eureka Config
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
